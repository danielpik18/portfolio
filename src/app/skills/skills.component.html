<div class="wrapper">
  <video src="assets/codingvid.mp4" autoplay loop class="bgVideo"></video>

  <div class="organizeButtons">
    <i
      class="fa fa-columns mr-3"
      style="font-size: 1.2rem;"
      (click)="currentView = 0"
    ></i>
    <i
      class="fa fa-list-ul mr-3"
      style="font-size: 1.2rem;"
      (click)="currentView = 1"
    ></i>
  </div>

  <div *ngIf="currentView === 0" class="originalViewWrapper">
    <div class="skillsWrapper">
      <div class="skills">
        <div class="d-flex align-items-center skillContainer">
          <div class="javascript skill">
            Javascript
          </div>
          <div class="css skill">CSS</div>
        </div>

        <div class="d-flex align-items-center skillContainer">
          <div class="angular skill">Angular 2</div>
          <div class="react skill">React</div>
          <div class="sass skill">SASS</div>
        </div>

        <div class="d-flex align-items-center skillContainer">
          <div class="html skill">HTML</div>
          <div class="php skill">PHP</div>
          <div class="firebase skill">Firebase</div>
          <div class="npm skill">NPM</div>
        </div>

        <div class="d-flex align-items-center skillContainer">
          <div class="node skill">Node JS</div>
          <div class="express skill">Express</div>
          <div class="sql skill">SQL</div>
          <div class="mongo skill">mongoDB</div>
        </div>

        <div class="d-flex align-items-center skillContainer">
          <div class="git skill">Git/github</div>
          <div class="csharp skill">C#</div>
          <div class="java skill">Java</div>
          <div class="uml skill">UML</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="currentView === 1" class="organizedViewWrapper">
  <div class="row" style="width: 100%;">
    <div class="col-12 col-md-4">
      <div class="d-flex flex-column general">
        <h6 style="font-weight: 600">
          <i class="mr-1 fa fa-layer-group"></i>
          Lenguajes generales
        </h6>

        <div *ngFor="let skill of skills.general">
          {{ skill }}
        </div>
      </div>

      <div class="my-5 d-flex flex-column webBasic">
        <h6 style="font-weight: 600">
          <i class="mr-1 fa fa-globe"></i>
          Web básicos
        </h6>
        <div *ngFor="let skill of skills.webBasic">
          {{ skill }}
        </div>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="d-flex flex-column frontEnd">
        <h6 style="font-weight: 600">
          <i class="mr-1 fab fa-js-square"></i>
          Front-end
        </h6>
        <div *ngFor="let skill of skills.frontEnd">
          {{ skill }}
        </div>
      </div>

      <div class="my-5 d-flex flex-column backEnd">
        <h6 style="font-weight: 600">
          <i class="mr-1 fa fa-server"></i>
          Back-end
        </h6>
        <div *ngFor="let skill of skills.backEnd">
          {{ skill }}
        </div>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="d-flex flex-column databases">
        <h6 style="font-weight: 600">
          <i class="mr-1 fa fa-database"></i>
          Bases de datos
        </h6>
        <div *ngFor="let skill of skills.databases">
          {{ skill }}
        </div>
      </div>

      <div class="my-5 d-flex flex-column other">
        <h6 style="font-weight: 600">
          <i class="mr-1 fa fa-cubes"></i>
          Otros
        </h6>
        <div *ngFor="let skill of skills.other">
          {{ skill }}
        </div>
      </div>
    </div>
  </div>
</div>

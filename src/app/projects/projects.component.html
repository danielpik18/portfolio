<div class="wrapper">
  <video
    src="./../../assets/Blurred Video of Scripts Being Typed.mp4"
    autoplay
    loop
    class="bgVideo"
  ></video>
  <span class="display-4 projectsTitle">Proyectos</span>
  <div class="projectsWrapper">
    <div class="borderHorizontal"></div>
    <div class="borderVertical"></div>
    <div class="projectsBackgroundColor"></div>

    <div class="projectsList">
      <div class="row">
        <div
          *ngFor="let project of projects"
          class="col col-sm-12 col-md-6 col-lg-4 my-5"
        >
          <a
            href="{{ project.link }}"
            target="_blank"
            style="text-decoration: none;"
          >
            <div class="projectItem">
              <div class="projectItem__header">
                {{ project.title }}
              </div>

              <div class="projectItem__body">
                <img src="{{ project.imageUrl }}" class="projectItem__image" />
              </div>

              <div class="projectItem__footer">
                <div class="d-flex">
                  <span *ngFor="let tech of project.tech" class="mx-3">
                    <i class="fa fa-arrows"></i>
                    {{ tech.name }}
                  </span>
                </div>
              </div>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
